version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nearbyconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-nearbyconnect2024}
      MYSQL_DATABASE: nearbyconnect
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=30
      --innodb-log-buffer-size=4M
      --innodb-log-file-size=48M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --tmp-table-size=16M
      --max-heap-table-size=16M
      --table-open-cache=200
      --sort-buffer-size=256K
      --read-buffer-size=256K
      --read-rnd-buffer-size=512K
      --join-buffer-size=256K
      --thread-cache-size=8
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nearbyconnect-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=nearbyconnect
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-nearbyconnect2024}
      - JWT_SECRET=${JWT_SECRET:-nearbyconnect-jwt-secret-change-in-production-2024}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - WS_ORIGINS=${WS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nearbyconnect-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:
  uploads:
