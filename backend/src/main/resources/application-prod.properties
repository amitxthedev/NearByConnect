# ========================
# Production Profile
# ========================

# ========================
# MySQL
# ========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nearbyconnect_dev}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:nearby}
spring.datasource.password=${DB_PASSWORD:nearby123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ========================
# CORS
# ========================
app.cors.allowed-origins=${CORS_ORIGINS:*}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ========================
# JWT
# ========================
app.jwt.secret=${JWT_SECRET:ZmRvd2p0ODgyMTM1NjQ3ODkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA==}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# ========================
# WebSocket
# ========================
app.websocket.allowed-origins=${WS_ORIGINS:*}

# ========================
# Logging
# ========================
logging.level.com.nearbyconnect=INFO
logging.level.org.springframework.security=WARN

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
