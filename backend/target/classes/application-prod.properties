# ========================
# Production Profile
# ========================
# Active via: SPRING_PROFILES_ACTIVE=prod

# ========================
# MySQL (via Docker or env vars)
# ========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nearbyconnect}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool - tuned for 4GB VPS
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================
# Flyway (schema management)
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ========================
# Logging (minimal for production)
# ========================
logging.level.com.nearbyconnect=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ========================
# Actuator (health only)
# ========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ========================
# Server tuning
# ========================
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=25
