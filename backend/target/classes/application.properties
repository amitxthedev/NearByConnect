# ========================
# Server Configuration
# ========================
server.port=8084
server.servlet.context-path=/api

# ========================
# Spring Application
# ========================
spring.application.name=nearbyconnect
spring.profiles.active=dev

# ========================
# Jackson JSON
# ========================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ========================
# Cache (Caffeine)
# ========================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# ========================
# JWT Configuration
# ========================
app.jwt.secret=${JWT_SECRET:ZmRvd2p0ODgyMTM1NjQ3ODkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA==}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# ========================
# CORS
# ========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ========================
# WebSocket
# ========================
app.websocket.allowed-origins=${WS_ORIGINS:http://localhost:5173}

# ========================
# File Upload
# ========================
app.upload.max-file-size=10485760
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp
app.upload.path=${UPLOAD_PATH:./uploads}

# ========================
# Anonymous Name Generation
# ========================
app.anonymous.animal-prefixes[0]=Fox
app.anonymous.animal-prefixes[1]=Wolf
app.anonymous.animal-prefixes[2]=Panda
app.anonymous.animal-prefixes[3]=Tiger
app.anonymous.animal-prefixes[4]=Eagle
app.anonymous.animal-prefixes[5]=Phoenix
app.anonymous.animal-prefixes[6]=Dragon
app.anonymous.animal-prefixes[7]=Lynx
app.anonymous.animal-prefixes[8]=Otter
app.anonymous.animal-prefixes[9]=Hawk
app.anonymous.animal-prefixes[10]=Raven
app.anonymous.animal-prefixes[11]=Cobra
app.anonymous.animal-prefixes[12]=Falcon
app.anonymous.animal-prefixes[13]=Lion
app.anonymous.animal-prefixes[14]=Bear
app.anonymous.animal-prefixes[15]=Deer
app.anonymous.animal-prefixes[16]=Shark
app.anonymous.animal-prefixes[17]=Whale
app.anonymous.animal-prefixes[18]=Stingray
app.anonymous.animal-prefixes[19]=Gecko

# ========================
# Logging
# ========================
logging.level.com.nearbyconnect=DEBUG

# ========================
# Actuator / Management
# ========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
